# ============================================================
# CNB 仓库 UI 定制 — 云原生开发启动按钮
# ============================================================
# 注意：此处 cpus 仅对默认模板有效；
# 若已在 .cnb.yml 中自定义流水线，请以 .cnb.yml 的 runner.cpus 为准。
# ============================================================
workspace:
  launch:
    # ---- 启动按钮外观 ----
    button:
      # 按钮名称
      name: 🚀 启动开发环境
      # 按钮描述（设为 null 则不显示）
      description: 4 核 CPU · Python 3.12 + Node.js 22 · Docker 内建

    # CPU 核心数（默认 8，此处设 4）
    cpus: 4

    # 是否禁用默认启动按钮（自定义流水线时可禁用）
    disabled: false

    # 环境创建后是否自动打开 WebIDE
    autoOpenWebIDE: false
