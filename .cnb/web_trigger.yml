# ============================================================
# CNB 自定义按钮 — 从上游 GitHub 同步代码
# ============================================================
# 此按钮用于一键从上游 GitHub 仓库同步最新代码到当前分支
# 对应的事件：web_trigger_sync_upstream（需在 .cnb.yml 中定义）
# ============================================================

# 按钮显示在所有分支的详情页
branch:
  - buttons:
      # ---- 同步按钮 ----
      - name: 从上游 GitHub 同步
        description: 一键从 GitHub 上游仓库合并最新代码
        # 对应 .cnb.yml 中的 web_trigger 事件名
        event: web_trigger_sync_upstream
